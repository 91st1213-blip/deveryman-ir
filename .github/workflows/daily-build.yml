name: Daily Build & Deploy

on:
  schedule:
    - cron: "45 8 * * 1-5"
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Fetch IR News
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: node fetch-news.mjs

      - name: Scrape MEC & Nomura News (Friday only)
        if: github.event_name == 'workflow_dispatch' || contains(github.event.schedule, '45 8 * * 5')
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          pip install playwright google-api-python-client google-auth
          playwright install chromium
          python3 scrape-news.py

      - name: Build
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=deveryman-ir --commit-dirty=true

      - name: Done
        run: echo "✅ Daily build completed at $(TZ=Asia/Tokyo date)"
